<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Stats</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; }
header { background: #e10600; padding: 20px 40px; display: flex; align-items: center; gap: 20px; }
header h1 { font-size: 28px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
header span { font-size: 14px; opacity: 0.8; }
nav { background: #1a1a1a; padding: 0 40px; display: flex; gap: 0; border-bottom: 2px solid #e10600; }
nav button { background: none; border: none; color: #aaa; padding: 16px 24px; cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
nav button:hover, nav button.active { color: #fff; border-bottom: 3px solid #e10600; margin-bottom: -2px; }
.year-selector { background: #111; padding: 16px 40px; display: flex; gap: 12px; align-items: center; }
.year-selector span { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
.year-btn { background: #222; border: 1px solid #333; color: #aaa; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: all 0.2s; }
.year-btn:hover, .year-btn.active { background: #e10600; border-color: #e10600; color: #fff; }
.container { padding: 30px 40px; }
.section { display: none; }
.section.active { display: block; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 30px; }
.card { background: #1a1a1a; border-radius: 8px; padding: 24px; border: 1px solid #222; }
.card h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #e10600; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; border-bottom: 1px solid #333; }
td { padding: 12px; font-size: 14px; border-bottom: 1px solid #1e1e1e; }
tr:hover td { background: #222; }
.pos { font-weight: 900; color: #e10600; width: 30px; }
.pts { font-weight: 700; color: #fff; }
.team { color: #aaa; font-size: 12px; }
.gp-selector { margin-bottom: 24px; }
.gp-selector select { background: #222; border: 1px solid #333; color: #fff; padding: 10px 16px; border-radius: 4px; font-size: 14px; width: 300px; cursor: pointer; }
.chart-card { background: #1a1a1a; border-radius: 8px; padding: 24px; border: 1px solid #222; margin-bottom: 24px; }
.chart-card h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: #e10600; margin-bottom: 20px; }
.medal { font-size: 16px; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .container { padding: 16px; } }
</style>
</head>
<body>

<header>
  <h1>🏎 F1 Stats</h1>
  <span>Statistiques Formula 1</span>
</header>

<nav>
  <button class="active" onclick="showSection('overview')">Vue generale</button>
  <button onclick="showSection('drivers')">Pilotes</button>
  <button onclick="showSection('constructors')">Constructeurs</button>
  <button onclick="showSection('gp')">Resultats GP</button>
</nav>

<div class="year-selector">
  <span>Saison :</span>
  <button class="year-btn active" onclick="setYear(2024, this)">2024</button>
  <button class="year-btn" onclick="setYear(2025, this)">2025</button>
</div>

<div class="container">

  <!-- VUE GENERALE -->
  <div id="overview" class="section active">
    <div class="grid">
      <div class="card">
        <h2>Top 5 Pilotes</h2>
        <table>
          <tr><th>#</th><th>Pilote</th><th>Equipe</th><th>Pts</th></tr>
          <tbody id="overview-drivers"></tbody>
        </table>
      </div>
      <div class="card">
        <h2>Top 5 Constructeurs</h2>
        <table>
          <tr><th>#</th><th>Equipe</th><th>Pts</th></tr>
          <tbody id="overview-constructors"></tbody>
        </table>
      </div>
    </div>
    <div class="chart-card">
      <h2>Evolution des points - Top 5 Pilotes</h2>
      <canvas id="chart-overview" height="100"></canvas>
    </div>
  </div>

  <!-- PILOTES -->
  <div id="drivers" class="section">
    <div class="card">
      <h2>Classement Pilotes</h2>
      <table>
        <tr><th>#</th><th>Pilote</th><th>Equipe</th><th>Pts</th></tr>
        <tbody id="drivers-table"></tbody>
      </table>
    </div>
  </div>

  <!-- CONSTRUCTEURS -->
  <div id="constructors" class="section">
    <div class="card">
      <h2>Classement Constructeurs</h2>
      <table>
        <tr><th>#</th><th>Equipe</th><th>Pts</th></tr>
        <tbody id="constructors-table"></tbody>
      </table>
    </div>
  </div>

  <!-- RESULTATS GP -->
  <div id="gp" class="section">
    <div class="gp-selector">
      <select id="gp-select" onchange="showGP()">
      </select>
    </div>
    <div class="card">
      <h2 id="gp-title">Resultats</h2>
      <table>
        <tr><th>#</th><th>Pilote</th><th>Equipe</th><th>Pts</th></tr>
        <tbody id="gp-table"></tbody>
      </table>
    </div>
  </div>

</div>

let currentYear = 2024;
let overviewChart = null;

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function setYear(year, btn) {
  currentYear = year;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function medals(i) {
  if (i === 0) return '<span class="medal">🥇</span>';
  if (i === 1) return '<span class="medal">🥈</span>';
  if (i === 2) return '<span class="medal">🥉</span>';
  return '<span class="pos">' + (i+1) + '</span>';
}

function renderOverview() {
  const drivers = DATA.driver_standings[currentYear] || [];
  const constructors = DATA.constructor_standings[currentYear] || [];
  
  let dHtml = '';
  drivers.slice(0,5).forEach((d,i) => {
    dHtml += '<tr><td>' + medals(i) + '</td><td><b>' + d.Abbreviation + '</b></td><td class="team">' + d.TeamName + '</td><td class="pts">' + d.Points + '</td></tr>';
  });
  document.getElementById('overview-drivers').innerHTML = dHtml;

  let cHtml = '';
  constructors.slice(0,5).forEach((c,i) => {
    cHtml += '<tr><td>' + medals(i) + '</td><td><b>' + c.TeamName + '</b></td><td class="pts">' + c.Points + '</td></tr>';
  });
  document.getElementById('overview-constructors').innerHTML = cHtml;

  renderOverviewChart(drivers.slice(0,5));
}

function renderOverviewChart(top5) {
  const gps = DATA.gp_list[currentYear] || [];
  const colors = ['#e10600','#00d2be','#1e41ff','#ff8700','#00a651'];
  
  const datasets = top5.map((driver, idx) => {
    let cumPoints = 0;
    const dataPoints = gps.map(gp => {
      const gpData = (DATA.gp_results[currentYear] || {})[gp] || [];
      const result = gpData.find(r => r.Abbreviation === driver.Abbreviation);
      cumPoints += result ? result.Points : 0;
      return cumPoints;
    });
    return { label: driver.Abbreviation, data: dataPoints, borderColor: colors[idx], backgroundColor: colors[idx] + '22', tension: 0.3, fill: false, pointRadius: 3 };
  });

  if (overviewChart) overviewChart.destroy();
  const ctx = document.getElementById('chart-overview').getContext('2d');
  overviewChart = new Chart(ctx, {
    type: 'line',
    data: { labels: gps.map(g => g.replace(' Grand Prix','')), datasets },
    options: {
      plugins: { legend: { labels: { color: '#aaa' } } },
      scales: {
        x: { ticks: { color: '#666', maxRotation: 45 }, grid: { color: '#222' } },
        y: { ticks: { color: '#666' }, grid: { color: '#222' } }
      }
    }
  });
}

function renderDrivers() {
  const drivers = DATA.driver_standings[currentYear] || [];
  let html = '';
  drivers.forEach((d,i) => {
    html += '<tr><td>' + medals(i) + '</td><td><b>' + d.Abbreviation + '</b></td><td class="team">' + d.TeamName + '</td><td class="pts">' + d.Points + '</td></tr>';
  });
  document.getElementById('drivers-table').innerHTML = html;
}

function renderConstructors() {
  const constructors = DATA.constructor_standings[currentYear] || [];
  let html = '';
  constructors.forEach((c,i) => {
    html += '<tr><td>' + medals(i) + '</td><td><b>' + c.TeamName + '</b></td><td class="pts">' + c.Points + '</td></tr>';
  });
  document.getElementById('constructors-table').innerHTML = html;
}

function renderGPSelector() {
  const gps = DATA.gp_list[currentYear] || [];
  let html = '';
  gps.forEach(gp => { html += '<option value="' + gp + '">' + gp + '</option>'; });
  document.getElementById('gp-select').innerHTML = html;
  showGP();
}

function showGP() {
  const gp = document.getElementById('gp-select').value;
  const results = (DATA.gp_results[currentYear] || {})[gp] || [];
  document.getElementById('gp-title').textContent = gp + ' ' + currentYear;
  let html = '';
  results.forEach((r,i) => {
    html += '<tr><td>' + medals(i) + '</td><td><b>' + r.Abbreviation + '</b></td><td class="team">' + r.TeamName + '</td><td class="pts">' + r.Points + '</td></tr>';
  });
  document.getElementById('gp-table').innerHTML = html;
}

function renderAll() {
  renderOverview();
  renderDrivers();
  renderConstructors();
  renderGPSelector();
}

renderAll();
